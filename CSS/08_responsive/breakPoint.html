<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Design</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #e09d9d;
        }
        .Responsive-div {
            width: 100%;
            max-width: 1200px;
            padding: 20px;
            color: black;
            font-size: 26px;
            background-color: #68dc1a;
        }
        @media (max-width: 600px) and (max-width:1000px) {
            body {
                align-items: flex-start;
            }
            .Responsive-div {
                background-color: #d9ff41;
            
            }
        }
        @media (min-width:601) {
            body {
                align-items: center;
            }
            .Responsive-div {
                background-color: #e36b6b;
            }
        }
    </style>
</head>
<body>
    <div class="Responsive-div">
    This div changes color based on the screen size
    </div>
</body>
</html>
