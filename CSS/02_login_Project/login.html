<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login page</title>
    <style>
        body {
            font-family:Arial, Helvetica, sans-serif ;
            background-color: #1a1a1a;
            margin: 0;
            padding: 0;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card{
            background-color: rgb(255, 153, 153);
            border-radius:10px ;
            padding: 30px;
            width: 300px;
        }
        h2 {
            color: rgba(156, 92, 234, 0.667);
            text-align: center;
            margin-bottom: 50px;
        }
         form {
            display: flex;
            flex-direction: column;
           
         }
         input {
            margin-bottom:15px ;
            padding: 10px;
            border-radius:10px;
            background-color: #fccfcf;
         }
         button {
            background-color: #94e957;
            color: rgb(77, 109, 109);
            padding: 12px;
            border-radius: 8px;

         }
         button:hover {
            background-color: #53bd07;
         }
    </style>
</head>
<body>
    <div class="card">
        <h2>Login</h2>
        <form>
            <input type="email" name="" id="" placeholder="Email">
            <input type="password" name="" id="" placeholder="Password">
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
